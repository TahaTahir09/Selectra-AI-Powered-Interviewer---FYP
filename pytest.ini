[pytest]
# Pytest configuration for Selectra AI Recruitment Platform

# Basic pytest settings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --nomigrations -v --strict-markers --tb=short

# Pytest markers
markers =
    unit: Unit tests (using mocks, no database)
    integration: Integration tests (with database)
    slow: Slow running tests
    django: Django specific tests
    flask: Flask specific tests

minversion = 7.0
DJANGO_SETTINGS_MODULE = config.settings_test
